name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (oxlint)
        run: pnpm lint

      - name: Typecheck (tsc --noEmit)
        run: pnpm typecheck

      - name: Unit tests (vitest)
        run: pnpm test

      - name: Build (tsup dual ESM+CJS + dts)
        run: pnpm --filter @mailway/core build

      - name: Types/exports map (are-the-types-wrong)
        run: pnpm attw

      - name: Schema drift check
        run: |
          node packages/core/dist/schema/emit.js
          git diff --exit-code packages/core/schemas
